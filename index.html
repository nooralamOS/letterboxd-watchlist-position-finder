<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Watchlist Finder — alazraq</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #14181C;
      --bg-card:  #1E2530;
      --bg-input: #1A2028;
      --orange:   #FF8000;
      --blue:     #40BCF4;
      --text:     #E8F0F5;
      --muted:    #7A8FA0;
      --border:   #2E3D4E;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Top bar ── */
    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 50px;
      background: rgba(10, 13, 16, 0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 28px;
      z-index: 10;
    }

    .topbar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    /* Letterboxd-style pill logo */
    .lb-mark {
      width: 28px;
      height: 19px;
      display: flex;
      gap: 2.5px;
    }

    .lb-mark span {
      flex: 1;
      border-radius: 50px;
    }

    .lb-mark span:nth-child(1) { background: #00C030; }
    .lb-mark span:nth-child(2) { background: #FF8000; }
    .lb-mark span:nth-child(3) { background: #40BCF4; }

    .topbar-name {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text);
    }

    .topbar-name em {
      font-style: normal;
      color: var(--muted);
      font-weight: 400;
      letter-spacing: 0;
      text-transform: none;
      margin-left: 6px;
      font-size: 12px;
    }

    /* ── Page layout ── */
    .page {
      min-height: 100vh;
      padding-top: 50px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 24px 80px;
      width: 100%;
      max-width: 580px;
    }

    .hero-title {
      font-size: 42px;
      font-weight: 900;
      letter-spacing: -0.03em;
      line-height: 1;
      color: var(--text);
      margin-bottom: 10px;
      text-align: center;
    }

    .hero-title .accent { color: var(--orange); }

    .hero-sub {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 40px;
      text-align: center;
    }

    .hero-sub .user {
      color: var(--blue);
      font-weight: 600;
    }

    /* ── Search form ── */
    .form {
      width: 100%;
      display: flex;
      gap: 8px;
    }

    .input {
      flex: 1;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: inherit;
      font-size: 15px;
      font-weight: 500;
      padding: 13px 18px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .input::placeholder { color: #3E5060; }

    .input:focus {
      border-color: var(--orange);
      box-shadow: 0 0 0 3px rgba(255, 128, 0, 0.14);
    }

    .btn {
      background: var(--orange);
      color: #000;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0.02em;
      padding: 13px 22px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.12s, transform 0.08s;
    }

    .btn:hover:not(:disabled) { background: #FF9A1F; }
    .btn:active:not(:disabled) { transform: scale(0.97); }
    .btn:disabled { opacity: 0.5; cursor: default; }

    /* ── Result area ── */
    .result-area {
      width: 100%;
      margin-top: 36px;
    }

    /* Loading */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 28px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
    }

    .dots { display: flex; gap: 5px; }

    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--orange);
      animation: dotpulse 1.4s ease-in-out infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes dotpulse {
      0%, 60%, 100% { opacity: 0.15; transform: scale(0.75); }
      30%            { opacity: 1;    transform: scale(1); }
    }

    /* Single result */
    .result-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 36px 40px 32px;
      text-align: center;
      animation: fadeup 0.28s cubic-bezier(0.22, 0.61, 0.36, 1);
    }

    @keyframes fadeup {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .result-title {
      font-size: 19px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
      margin-bottom: 28px;
    }

    .result-title .year {
      color: var(--muted);
      font-weight: 400;
      font-size: 16px;
    }

    .result-number-wrap {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      gap: 3px;
      margin-bottom: 10px;
    }

    .result-hash {
      font-size: 36px;
      font-weight: 900;
      color: var(--orange);
      line-height: 1;
      margin-top: 14px;
    }

    .result-num {
      font-size: 96px;
      font-weight: 900;
      letter-spacing: -0.04em;
      line-height: 1;
      color: var(--text);
    }

    .result-label {
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-weight: 500;
    }

    /* Divider */
    .result-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 28px 0 24px;
    }

    /* Multiple results */
    .result-list {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      animation: fadeup 0.28s cubic-bezier(0.22, 0.61, 0.36, 1);
    }

    .result-list-header {
      padding: 13px 22px;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .result-list-item {
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 15px 22px;
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }

    .result-list-item:last-child { border-bottom: none; }
    .result-list-item:hover { background: rgba(255,255,255,0.03); }

    .result-list-pos {
      font-size: 17px;
      font-weight: 800;
      color: var(--orange);
      min-width: 52px;
      text-align: right;
    }

    .result-list-name {
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
    }

    .result-list-name .year {
      color: var(--muted);
      font-weight: 400;
    }

    /* Not found */
    .not-found {
      text-align: center;
      padding: 32px;
      color: var(--muted);
      font-size: 14px;
      animation: fadeup 0.28s ease;
    }

    .not-found strong {
      color: var(--text);
      font-style: italic;
    }

    /* ── Footer ── */
    /* Warm-up pill */
    .warmup {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 32px;
      padding: 5px 12px;
      border-radius: 99px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      font-size: 12px;
      color: var(--muted);
      font-weight: 500;
      transition: opacity 0.4s;
    }

    .warmup.hidden { opacity: 0; pointer-events: none; }

    .warmup-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--orange);
      animation: dotpulse 1.4s ease-in-out infinite;
    }

    .warmup-dot.ready { background: #00C030; animation: none; }

    footer {
      padding: 24px;
      font-size: 12px;
      color: #3A4E5E;
      text-align: center;
    }
  </style>
</head>
<body>

<nav class="topbar">
  <a class="topbar-logo" href="https://letterboxd.com/alazraq/watchlist/" target="_blank">
    <div class="lb-mark">
      <span></span><span></span><span></span>
    </div>
    <span class="topbar-name">Letterboxd <em>Watchlist Finder</em></span>
  </a>
</nav>

<div class="page">
  <div class="hero">

    <h1 class="hero-title">Where is it<span class="accent">?</span></h1>
    <p class="hero-sub">Find a film's position in <span class="user">@alazraq</span>'s watchlist</p>

    <div class="warmup" id="warmup">
      <span class="warmup-dot" id="warmupDot"></span>
      <span id="warmupText">Loading watchlist…</span>
    </div>

    <form class="form" id="form">
      <input
        class="input"
        id="input"
        type="text"
        placeholder="Film title…"
        autocomplete="off"
        spellcheck="false"
        autofocus
      />
      <button class="btn" id="btn" type="submit">Find</button>
    </form>

    <div class="result-area" id="result"></div>

  </div>

  <footer>alazraq &bull; Letterboxd watchlist &bull; 661 films</footer>
</div>

<script>
  const form      = document.getElementById('form');
  const input     = document.getElementById('input');
  const btn       = document.getElementById('btn');
  const result    = document.getElementById('result');
  const warmup    = document.getElementById('warmup');
  const warmupDot = document.getElementById('warmupDot');
  const warmupTxt = document.getElementById('warmupText');

  // Poll /api/status until cache is ready
  async function pollStatus() {
    try {
      const res  = await fetch('/api/status');
      const data = await res.json();
      if (data.ready) {
        warmupDot.classList.add('ready');
        warmupTxt.textContent = `${data.count} films loaded`;
        setTimeout(() => warmup.classList.add('hidden'), 1200);
        return;
      }
    } catch {}
    setTimeout(pollStatus, 600);
  }
  pollStatus();

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const q = input.value.trim();
    if (!q) return;

    btn.disabled = true;
    btn.textContent = '…';
    result.innerHTML = `
      <div class="loading">
        <div class="dots">
          <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
        Scanning watchlist
      </div>`;

    try {
      const res  = await fetch('/api/search?q=' + encodeURIComponent(q));
      const data = await res.json();
      render(data, q);
    } catch {
      result.innerHTML = `<div class="not-found">Could not reach the server.</div>`;
    } finally {
      btn.disabled = false;
      btn.textContent = 'Find';
    }
  });

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function splitName(full) {
    const m = full.match(/^(.*?)\s*(\(\d{4}\))\s*$/);
    return m ? { title: m[1], year: m[2] } : { title: full, year: '' };
  }

  function render(data, q) {
    if (data.error === 'not found') {
      result.innerHTML = `
        <div class="not-found">
          <strong>"${esc(q)}"</strong> wasn't found in the watchlist.
        </div>`;
      return;
    }

    if (data.error) {
      result.innerHTML = `<div class="not-found">${esc(data.error)}</div>`;
      return;
    }

    const items = data.results;

    if (items.length === 1) {
      const { title, year } = splitName(items[0].name);
      result.innerHTML = `
        <div class="result-card">
          <div class="result-title">
            ${esc(title)} <span class="year">${esc(year)}</span>
          </div>
          <hr class="result-divider">
          <div class="result-number-wrap">
            <span class="result-hash">#</span>
            <span class="result-num">${items[0].position}</span>
          </div>
          <div class="result-label">in your watchlist</div>
        </div>`;
    } else {
      const rows = items.map(r => {
        const { title, year } = splitName(r.name);
        return `
          <div class="result-list-item">
            <div class="result-list-pos">#${r.position}</div>
            <div class="result-list-name">
              ${esc(title)} <span class="year">${esc(year)}</span>
            </div>
          </div>`;
      }).join('');

      result.innerHTML = `
        <div class="result-list">
          <div class="result-list-header">${items.length} matches</div>
          ${rows}
        </div>`;
    }
  }
</script>
</body>
</html>
